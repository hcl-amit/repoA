name: Terraform CI Pipeline

on:

  push:
    branches:
      - develop
      - feature/**

  pull_request:
    branches:
      - main

  workflow_dispatch:

    inputs:

      module_name:
        description: "Module name(s) to run — single or comma-separated (e.g. resource-group,virtual-network)"
        required: true
        default: resource-group

permissions:

  id-token: write
  contents: write
  pull-requests: write
  issues: write

jobs:

  bootstrap:

    uses: ulse-amit1/repoB/.github/workflows/terraform-cloud-bootstrap.yml@main

    with:

      organization: HCL-TERRA-TEAM

      workspace_name: dev-workspace

      module_name: ${{ inputs.module_name || 'resource-group,virtual-network' }}

    secrets:

      TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}

      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}

      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  validate:

    needs: bootstrap

    uses: ulse-amit1/repoB/.github/workflows/terraform-validate.yml@main

    with:

      module_name: ${{ inputs.module_name || 'resource-group,virtual-network' }}

    secrets:

      TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}

  tflint:

    needs: validate

    uses: ulse-amit1/repoB/.github/workflows/terraform-tflint.yml@main

    with:

      module_name: ${{ inputs.module_name || 'resource-group,virtual-network' }}

  trivy:

    needs: tflint

    uses: ulse-amit1/repoB/.github/workflows/terraform-trivy.yml@main

    with:

      module_name: ${{ inputs.module_name || 'resource-group,virtual-network' }}

  # ---------------------------------------------------------------
  # Runs ONLY on push to develop, right after trivy succeeds.
  # Raises a PR develop -> main, assigns a reviewer (GitHub sends
  # the reviewer an email automatically), tags it for the 24-hour
  # expiry check, and enables auto-merge so it merges the instant
  # the reviewer approves it.
  # --------------------------------------------------------------
  auto-pr:

    needs: trivy

    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure auto-pr Label Exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "auto-pr" \
            --description "Auto-raised PR from develop pipeline" \
            --color "0E8A16" \
            --force

      - name: Create Pull Request (develop -> main)
        id: create_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          EXISTING_PR=$(gh pr list --base main --head develop --state open --json number --jq '.[0].number')

          if [ -n "$EXISTING_PR" ]; then
            echo "Open PR already exists: #$EXISTING_PR"
            echo "pr_number=$EXISTING_PR" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PR_URL=$(gh pr create \
            --base main \
            --head develop \
            --title "Auto PR: develop -> main ($(date -u +'%Y-%m-%d %H:%M UTC'))" \
            --body "Automatically raised after develop pipeline (bootstrap, validate, tflint, trivy) passed. Requires approval within 24 hours or this PR will be auto-closed." \
            --label "auto-pr" \
            --reviewer "${{ vars.PR_REVIEWER }}")

          PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Enable Auto-Merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ steps.create_pr.outputs.pr_number }} \
            --auto \
            --squash

  # ---------------------------------------------------------------
  # Manual / PR-triggered only — these still run on workflow_dispatch
  # and on pull_request events, but are SKIPPED on a plain push to
  # develop (since the client only wants up to trivy on push).
  # ---------------------------------------------------------------
  terraform-test:

    needs: trivy

    if: github.event_name != 'push' || github.ref != 'refs/heads/develop'

    uses: ulse-amit1/repoB/.github/workflows/terraform-test.yml@main

    with:

      module_name: ${{ inputs.module_name || 'resource-group,virtual-network' }}

    secrets:

      TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}

      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}

      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  # plan:

