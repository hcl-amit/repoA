name: Terraform CI Pipeline

on:

  push:
    branches:
      - develop
      - feature/**

  pull_request:
    branches:
      - main

  workflow_dispatch:

    inputs:

      module_name:
        description: "Module name(s) to run — single or comma-separated (e.g. resource-group,virtual-network)"
        required: true
        default: resource-group

permissions:

  id-token: write
  contents: read

jobs:

  bootstrap:

    uses: ulse-amit1/repoB/.github/workflows/terraform-cloud-bootstrap.yml@main

    with:

      organization: HCL-TERRA-TEAM

      workspace_name: dev-workspace

      module_name: ${{ inputs.module_name }}

    secrets:

      TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}

      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}

      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  validate:

    needs: bootstrap

    uses: ulse-amit1/repoB/.github/workflows/terraform-validate.yml@main

    with:

      module_name: ${{ inputs.module_name }}

    secrets:

      TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}

  tflint:

    needs: validate

    uses: ulse-amit1/repoB/.github/workflows/terraform-tflint.yml@main

    with:

      module_name: ${{ inputs.module_name }}

  trivy:

    needs: tflint

    uses: ulse-amit1/repoB/.github/workflows/terraform-trivy.yml@main

    with:

      module_name: ${{ inputs.module_name }}

  terraform-test:

    needs: trivy

    uses: ulse-amit1/repoB/.github/workflows/terraform-test.yml@main

    with:

      module_name: ${{ inputs.module_name }}

    secrets:

      TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}

      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}

      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  plan:

    needs: terraform-test

    uses: ulse-amit1/repoB/.github/workflows/terraform-plan.yml@main

    with:

      module_name: ${{ inputs.module_name }}

    secrets:

      TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}

      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}

      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  opa:

    needs: plan

    uses: ulse-amit1/repoB/.github/workflows/terraform-opa.yml@main

    with:

      module_name: ${{ inputs.module_name }}